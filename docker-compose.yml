version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: crypto_postgres
    environment:
      POSTGRES_DB: cryptotracker
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: crypto_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
