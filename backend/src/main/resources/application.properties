spring.application.name=crypto-tracker

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/cryptotracker
spring.datasource.username=crypto_user
spring.datasource.password=crypto_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
app.jwt.secret=change-this-to-a-very-long-secret-key-in-production-min-256-bits
app.jwt.expiration-ms=86400000

# CoinGecko API
app.coingecko.base-url=https://api.coingecko.com/api/v3
app.coingecko.fetch-interval-ms=180000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server
server.port=8080
