spring.application.name=crypto-tracker

# PostgreSQL — production'da environment variable'dan gelir
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/cryptotracker}
spring.datasource.username=${DATABASE_USER:crypto_user}
spring.datasource.password=${DATABASE_PASS:crypto_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secret-key-in-production-min-256-bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CoinGecko API
app.coingecko.base-url=https://api.coingecko.com/api/v3
app.coingecko.fetch-interval-ms=${COINGECKO_FETCH_INTERVAL_MS:180000}

# CryptoCompare API
app.cryptocompare.base-url=https://api.rss2json.com

# CORS — production'da frontend domain'i buraya yazılır
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Server
server.port=${PORT:8080}
